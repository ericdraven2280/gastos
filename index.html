<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Gastos Personales</title>
    <!-- Tailwind CSS desde CDN para diseño rápido y elegante -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Personalización rápida del interruptor (toggle switch) */
        .dot { transition: all 0.3s ease-in-out; }
        input:checked ~ .dot { transform: translateX(100%); }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Encabezado -->
        <header class="mb-8 text-center md:text-left">
            <h1 class="text-3xl font-extrabold text-indigo-400">Control de Finanzas</h1>
            <p class="text-gray-400 text-sm mt-1">Ingreso manual rápido o importación directa desde Mercado Pago</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- COLUMNA IZQUIERDA: Formulario de Carga Tradicional -->
            <div class="md:col-span-1 bg-gray-800 p-6 rounded-2xl shadow-xl border border-gray-700 h-fit">
                <h2 class="text-lg font-bold mb-4 text-indigo-300">Nuevo Movimiento</h2>
                
                <form id="txForm" class="space-y-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Descripción</label>
                        <input id="descriptionInput" type="text" placeholder="Ej: Supermercado" required 
                               class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>

                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Monto ($)</label>
                        <input id="amountInput" type="number" step="0.01" placeholder="0.00" required
                               class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>

                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Fecha</label>
                        <input id="dateInput" type="date" required
                               class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>

                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Tipo</label>
                        <select id="typeInput" class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                            <option value="expense">Gasto (-)</option>
                            <option value="income">Ingreso (+)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Asignado a</label>
                        <select id="userInput" class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                            <option value="Ambos">Ambos</option>
                            <option value="Nico">Nico</option>
                            <option value="Ceci">Ceci</option>
                        </select>
                    </div>

                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2 rounded-lg text-sm transition-all shadow-md">
                        Guardar Registro
                    </button>
                </form>
            </div>

            <!-- COLUMNA DERECHA: Entrada de Texto Libre e Importación MP -->
            <div class="md:col-span-2 bg-gray-800 p-6 rounded-2xl shadow-xl border border-gray-700 flex flex-col justify-between">
                <div>
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4">
                        <h2 class="text-lg font-bold text-indigo-300">Carga Inteligente / Importación</h2>
                        
                        <!-- Toggle Switch: Modo Texto Libre vs Modo Mercado Pago -->
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-gray-400">Modo Texto</span>
                            <label for="modeSwitch" class="flex items-center cursor-pointer select-none">
                                <div class="relative">
                                    <input type="checkbox" id="modeSwitch" class="sr-only" checked>
                                    <div class="block bg-gray-600 w-10 h-6 rounded-full"></div>
                                    <div class="dot absolute left-1 top-1 bg-indigo-400 w-4 h-4 rounded-full transition-transform"></div>
                                </div>
                            </label>
                            <span class="text-xs text-indigo-400 font-bold">Mercado Pago</span>
                        </div>
                    </div>

                    <!-- Input para asignación por defecto al procesar de MP -->
                    <div class="mb-4 bg-gray-900 p-3 rounded-lg border border-gray-700 flex items-center justify-between">
                        <span class="text-xs text-gray-400">Asignar transacciones de MP por defecto a:</span>
                        <select id="mpDefaultUser" class="bg-gray-800 text-white text-xs rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                            <option value="Ambos">Ambos</option>
                            <option value="Nico" selected>Nico</option>
                            <option value="Ceci">Ceci</option>
                        </select>
                    </div>

                    <textarea id="rawTextInput" rows="10" 
                              placeholder="Pegá acá el texto libre (ej: 'Ayer gastamos 1500 en mcdonalds nico') o seleccioná el texto del resumen web de Mercado Pago y pegalo completo acá..." 
                              class="w-full bg-gray-900 text-gray-200 border border-gray-700 rounded-xl p-4 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 font-mono"></textarea>
                </div>

                <div class="mt-4">
                    <button id="btnProcessRaw" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-3 rounded-xl transition-all shadow-lg flex justify-center items-center gap-2">
                        <span>⚡ Procesar e Importar</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK v9+ (Módulos vía CDN) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        // =========================================================================
        // CONFIGURACIÓN DE FIREBASE (Reemplazá con tus credenciales reales)
        // =========================================================================
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROJECT_ID.firebaseapp.com",
            projectId: "TU_PROJECT_ID",
            storageBucket: "TU_PROJECT_ID.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };

        // Inicializar Firebase y Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const txCollection = collection(db, "transacciones"); // Nombre de tu colección en Firestore

        // =========================================================================
        // ELEMENTOS DEL DOM
        // =========================================================================
        const txForm = document.getElementById('txForm');
        const descriptionInput = document.getElementById('descriptionInput');
        const amountInput = document.getElementById('amountInput');
        const dateInput = document.getElementById('dateInput');
        const typeInput = document.getElementById('typeInput');
        const userInput = document.getElementById('userInput');
        
        const modeSwitch = document.getElementById('modeSwitch');
        const mpDefaultUser = document.getElementById('mpDefaultUser');
        const rawTextInput = document.getElementById('rawTextInput');
        const btnProcessRaw = document.getElementById('btnProcessRaw');

        // Establecer la fecha de hoy por defecto en el campo de fecha manual
        const hoy = new Date();
        dateInput.value = hoy.toISOString().split('T')[0];

        // =========================================================================
        // ACCIÓN 1: GUARDADO MANUAL TRADICIONAL
        // =========================================================================
        txForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const nuevaTransaccion = {
                description: descriptionInput.value.trim(),
                amount: parseFloat(amountInput.value),
                date: dateInput.value,
                type: typeInput.value,
                user: userInput.value,
                createdAt: Date.now()
            };

            try {
                await addDoc(txCollection, nuevaTransaccion);
                alert("¡Transacción guardada con éxito!");
                txForm.reset();
                dateInput.value = hoy.toISOString().split('T')[0]; // Resetear a hoy
            } catch (err) {
                console.error("Error al guardar:", err);
                alert("Error al intentar guardar en Firestore.");
            }
        });

        // =========================================================================
        // ACCIÓN 2: PROCESAMIENTO INTELIGENTE (TEXTO LIBRE / MERCADO PAGO)
        // =========================================================================
        btnProcessRaw.addEventListener('click', async () => {
            const textoOriginal = rawTextInput.value.trim();
            if (!textoOriginal) {
                alert("Por favor, escribí o pegá un texto primero.");
                return;
            }

            if (modeSwitch.checked) {
                // --- MODO MERCADO PAGO OPTIMIZADO ---
                const lineas = textoOriginal.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                
                let transaccionesDetectadas = [];
                let i = 0;

                // Variables de control para armar una transacción por lote
                let fechaActualStr = hoy.toISOString().split('T')[0];
                let descripcion = "";
                let tipo = "expense";
                let monto = null;

                const meses = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];

                while (i < lineas.length) {
                    const linea = lineas[i];

                    // 1. Detectar Cambios de Fecha en el lote copiado
                    if (linea.toLowerCase() === "hoy") {
                        fechaActualStr = hoy.toISOString().split('T')[0];
                        i++;
                        continue;
                    } else if (linea.toLowerCase() === "ayer") {
                        const ayer = new Date();
                        ayer.setDate(ayer.getDate() - 1);
                        fechaActualStr = ayer.toISOString().split('T')[0];
                        i++;
                        continue;
                    } else {
                        // Match fechas tipo "15 de julio"
                        const matchFecha = linea.match(/^(\d+)\s+de\s+([a-z]+)/i);
                        if (matchFecha) {
                            const dia = parseInt(matchFecha[1]);
                            const mesStr = matchFecha[2].toLowerCase();
                            const numMes = meses.indexOf(mesStr);
                            if (numMes !== -1) {
                                const anioParaFecha = hoy.getFullYear();
                                const fechaTemp = new Date(anioParaFecha, numMes, dia);
                                fechaActualStr = fechaTemp.toISOString().split('T')[0];
                            }
                            i++;
                            continue;
                        }
                    }

                    // 2. Si detectamos un signo de operación solo ("-" o "+")
                    if (linea === "-" || linea === "+") {
                        tipo = (linea === "+") ? "income" : "expense";
                        
                        // El monto suele estar en la siguiente línea después del signo peso
                        if (i + 1 < lineas.length && lineas[i + 1] === "$") {
                            let offset = 2;
                            let parteEntera = lineas[i + offset] || "";
                            let parteDecimal = "00";

                            // Mercado Pago a veces separa los decimales con coma en una línea nueva
                            if (i + offset + 1 < lineas.length && lineas[i + offset + 1].startsWith(",")) {
                                parteDecimal = lineas[i + offset + 1].replace(",", "").trim();
                                offset++;
                            } else if (i + offset + 1 < lineas.length && /^\d{2}$/.test(lineas[i + offset + 1])) {
                                // Caso donde los decimales vienen solos en la siguiente línea (ej: "84")
                                parteDecimal = lineas[i + offset + 1].trim();
                                offset++;
                            }

                            // Limpiamos los puntos de miles
                            const valorLimpio = parteEntera.replace(/\./g, "") + "." + parteDecimal;
                            monto = parseFloat(valorLimpio);

                            // 3. Buscar descripción hacia atrás (el nombre del comercio o persona)
                            let idxDesc = i - 1;
                            descripcion = "";
                            
                            while (idxDesc >= 0) {
                                const lAtras = lineas[idxDesc];
                                // Omitimos palabras clave del diseño de MP para encontrar el nombre real
                                if (lAtras !== "Dinero disponible" && 
                                    lAtras !== "Aprobado" && 
                                    lAtras !== "Compra" && 
                                    lAtras !== "Transferencia enviada" &&
                                    lAtras !== "Ingreso de dinero" &&
                                    lAtras !== "Con transferencia" &&
                                    !lAtras.match(/^\d{2}:\d{2}$/)) { // Ignorar horas
                                    
                                    descripcion = lAtras;
                                    break;
                                }
                                idxDesc--;
                            }

                            // Si no se encuentra descripción legible
                            if (!descripcion) {
                                descripcion = (tipo === "income") ? "Ingreso de dinero" : "Gasto Mercado Pago";
                            }

                            // Limpiar nombres duplicados consecutivos o textos basura
                            descripcion = descripcion
                                .replace(/pagaste a/gi, '')
                                .trim();

                            if (!isNaN(monto) && monto > 0) {
                                transaccionesDetectadas.push({
                                    description: descripcion,
                                    amount: monto,
                                    date: fechaActualStr,
                                    type: tipo,
                                    user: mpDefaultUser.value
                                });
                            }

                            i += offset; // Saltamos las líneas procesadas del bloque de monto
                        }
                    }
                    i++;
                }

                // 4. Guardar directamente en Firestore todas las detectadas
                if (transaccionesDetectadas.length > 0) {
                    let guardados = 0;
                    for (const tx of transaccionesDetectadas) {
                        try {
                            await addDoc(txCollection, {
                                ...tx,
                                createdAt: Date.now()
                            });
                            guardados++;
                        } catch (err) {
                            console.error("Error al guardar transacción:", tx, err);
                        }
                    }
                    rawTextInput.value = "";
                    alert(`¡Se procesaron e importaron con éxito ${guardados} movimientos a la base de datos!`);
                } else {
                    alert("No pudimos extraer transacciones estructuradas de este bloque de texto. Comprobá que incluya los montos y los signos + o -.");
                }

            } else {
                // --- MODO TEXTO LIBRE (Carga rápida unificada al formulario) ---
                let texto = textoOriginal.toLowerCase();
                const regexMonto = /(?:[\$]?)\s*(\d+(?:[\.,]\d{3})*(?:[\.,]\d{2})?)/;
                const coincidenciaMonto = texto.match(regexMonto);
                let monto = 0;
                
                if (coincidenciaMonto) {
                    let montoLimpio = coincidenciaMonto[1].replace(/\./g, '').replace(',', '.');
                    monto = parseFloat(montoLimpio);
                }

                let usuario = "Ambos";
                if (texto.includes("ceci") || texto.includes("cecilia") || texto.includes("chechu")) {
                    usuario = "Ceci";
                } else if (texto.includes("nico") || texto.includes("nicolas") || texto.includes("nick")) {
                    usuario = "Nico";
                }

                let tipo = "expense";
                if (texto.includes("gane") || texto.includes("sueldo") || texto.includes("ingreso") || texto.includes("me pagaron") || texto.includes("cobre")) {
                    tipo = "income";
                }

                const fechaObj = new Date();
                if (texto.includes("ayer")) {
                    fechaObj.setDate(fechaObj.getDate() - 1);
                }
                const fechaFormateada = fechaObj.toISOString().split('T')[0];

                let descripcion = textoOriginal;
                if (coincidenciaMonto) {
                    descripcion = descripcion.replace(coincidenciaMonto[0], '');
                }

                const removerPalabras = [
                    /ceci/gi, /cecilia/gi, /chechu/gi, /nico/gi, /nicolas/gi, 
                    /ayer/gi, /gastamos/gi, /gasté/gi, /gaste/gi, /compramos/gi, 
                    /pagué/gi, /pague/gi, /en/gi, /para/gi, /el/gi, /la/gi, /los/gi, /de/gi, /un/gi, /una/gi
                ];

                removerPalabras.forEach(regex => {
                    descripcion = descripcion.replace(regex, '');
                });

                descripcion = descripcion.replace(/[-:,]/g, '').replace(/\s+/g, ' ').trim();
                
                if (descripcion.length > 0) {
                    descripcion = descripcion.charAt(0).toUpperCase() + descripcion.slice(1);
                } else {
                    descripcion = "Varios";
                }

                // Autocompletamos los campos superiores para que los valides antes de enviar
                descriptionInput.value = descripcion;
                amountInput.value = monto > 0 ? monto : '';
                dateInput.value = fechaFormateada;
                typeInput.value = tipo;
                userInput.value = usuario;

                rawTextInput.value = "";
                alert(`¡Carga rápida procesada! Confirmá los detalles en el formulario izquierdo y guardá.`);
            }
        });
    </script>
</body>
</html>
