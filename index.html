<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Gastos en Pareja</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --primary: #4a90e2;
            --income: #2ecc71;
            --expense: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1, h2 {
            text-align: center;
            color: #2c3e50;
        }

        .balance-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-num {
            font-size: 2rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .flex-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .stat {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
        }

        .stat.inc { background-color: var(--income); }
        .stat.exp { background-color: var(--expense); }

        .form-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }

        .history-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .list {
            list-style-type: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
        }

        .list-item .details {
            display: flex;
            flex-direction: column;
        }

        .list-item .responsible {
            font-size: 0.75rem;
            color: #7f8c8d;
            text-transform: uppercase;
            font-weight: bold;
        }

        .amt-inc { color: var(--income); font-weight: bold; }
        .amt-exp { color: var(--expense); font-weight: bold; }
        
        .delete-btn {
            background: none;
            border: none;
            color: #c0392b;
            cursor: pointer;
            font-size: 1.2rem;
            width: auto;
            padding: 0 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>💸 Gastos Compartidos Nico y Ceci</h1>

    <div class="balance-card">
        <h3>Balance Total</h3>
        <div class="balance-num" id="balance">$0.00</div>
        <div class="flex-row">
            <div class="stat inc">Ingresos: <span id="total-income">$0</span></div>
            <div class="stat exp">Gastos: <span id="total-expenses">$0</span></div>
        </div>
    </div>

    <div class="form-card">
        <h2>Añadir Transacción</h2>
        <form id="tx-form">
            <div class="form-group">
                <label for="description">Descripción</label>
                <input type="text" id="description" placeholder="Ej. Supermercado, Luz, Sueldo..." required>
            </div>
            <div class="form-group">
                <label for="amount">Monto ($)</label>
                <input type="number" id="amount" step="0.01" placeholder="Ej. 1500" required>
            </div>
            <div class="flex-row">
                <div class="form-group" style="flex: 1;">
                    <label for="type">Tipo</label>
                    <select id="type">
                        <option value="expense">Gasto</option>
                        <option value="income">Ingreso</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="user">¿Quién?</label>
                    <select id="user">
                        <option value="Él">Nico</option>
                        <option value="Ella">Ceci</option>
                        <option value="Ambos">Ambos</option>
                    </select>
                </div>
            </div>
            <button type="submit">Guardar Registro</button>
        </form>
    </div>

    <div class="history-card">
        <h2>Historial de Movimientos</h2>
        <ul id="tx-list" class="list">
            </ul>
    </div>
</div>

<script>
    const form = document.getElementById('tx-form');
    const descriptionInput = document.getElementById('description');
    const amountInput = document.getElementById('amount');
    const typeInput = document.getElementById('type');
    const userInput = document.getElementById('user');
    const txList = document.getElementById('tx-list');
    const balanceEl = document.getElementById('balance');
    const incomeEl = document.getElementById('total-income');
    const expensesEl = document.getElementById('total-expenses');

    // Cargar datos desde LocalStorage
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

    function updateDOM() {
        txList.innerHTML = '';
        
        let income = 0;
        let expenses = 0;

        // Renderizar lista al revés para ver lo más reciente arriba
        transactions.slice().reverse().forEach(tx => {
            const sign = tx.type === 'income' ? '+' : '-';
            const itemClass = tx.type === 'income' ? 'amt-inc' : 'amt-exp';
            
            if (tx.type === 'income') income += tx.amount;
            else expenses += tx.amount;

            const li = document.createElement('li');
            li.classList.add('list-item');
            li.innerHTML = `
                <div class="details">
                    <span>${tx.description}</span>
                    <span class="responsible">Por: ${tx.user}</span>
                </div>
                <div>
                    <span class="${itemClass}">${sign}$${tx.amount.toFixed(2)}</span>
                    <button class="delete-btn" onclick="deleteTransaction(${tx.id})">×</button>
                </div>
            `;
            txList.appendChild(li);
        });

        const totalBalance = income - expenses;
        balanceEl.innerText = `$${totalBalance.toFixed(2)}`;
        incomeEl.innerText = `$${income.toFixed(2)}`;
        expensesEl.innerText = `$${expenses.toFixed(2)}`;
        
        // Color del balance general
        balanceEl.style.color = totalBalance >= 0 ? '#2ecc71' : '#e74c3c';
    }

    function addTransaction(e) {
        e.preventDefault();

        const transaction = {
            id: Date.now(),
            description: descriptionInput.value,
            amount: parseFloat(amountInput.value),
            type: typeInput.value,
            user: userInput.value
        };

        transactions.push(transaction);
        localStorage.setItem('transactions', JSON.stringify(transactions));
        
        updateDOM();
        form.reset();
    }

    function deleteTransaction(id) {
        transactions = transactions.filter(tx => tx.id !== id);
        localStorage.setItem('transactions', JSON.stringify(transactions));
        updateDOM();
    }

    form.addEventListener('submit', addTransaction);
    
    // Inicializar app
    updateDOM();
</script>

</body>
</html>
